# Minimal resource configuration for Helm deployment
# Minimum ~2 CPUs, scales up when more resources available
# Usage: helm install crapi ./deploy/helm -f values-minimal.yaml

# Global settings
imagePullPolicy: IfNotPresent

identity:
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

community:
  replicaCount: 1
  resources:
    requests:
      cpu: "150m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

workshop:
  replicaCount: 1
  resources:
    requests:
      cpu: "400m"
      memory: "192Mi"
    limits:
      cpu: "1500m"
      memory: "768Mi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  config:
    gunicornWorkers: 2  # Start with 2, will scale horizontally via HPA

chatbot:
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

web:
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "192Mi"

postgresdb:
  resources:
    requests:
      cpu: "300m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

mongodb:
  resources:
    requests:
      cpu: "200m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

chromadb:
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

mailhog:
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "300m"
      memory: "128Mi"

apiGatewayService:
  resources:
    requests:
      cpu: "50m"
      memory: "16Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"

# Total minimum requests: ~1.7 CPUs, ~800MB RAM
# Total maximum limits: ~6.5 CPUs, ~3.2GB RAM
