apiVersion: v1
kind: ConfigMap
metadata:
  name: crapi-workshop-configmap
  labels:
    app: crapi-workshop
data:
    IDENTITY_SERVICE: crapi-identity:8080
    SECRET_KEY: crapi
    DB_HOST: postgresdb
    DB_USER: admin
    DB_PASSWORD: crapisecretpassword
    DB_NAME: crapi
    DB_PORT: "5432"
    MONGO_DB_HOST: mongodb
    MONGO_DB_PORT: "27017"
    MONGO_DB_USER: admin
    MONGO_DB_PASSWORD: crapisecretpassword
    MONGO_DB_NAME: crapi
    SERVER_PORT: "8000"
    API_GATEWAY_URL: "https://api.mypremiumdealership.com"
    # Gunicorn configuration for better performance under load
    GUNICORN_WORKERS: "4"
    GUNICORN_TIMEOUT: "120"
    GUNICORN_MAX_REQUESTS: "1000"
    GUNICORN_MAX_REQUESTS_JITTER: "50"
    # Database connection pooling (600 seconds = 10 minutes)
    DB_CONN_MAX_AGE: "600"
